<h1>
😘 & 🫂 Counters ❤️
</h1>

<!-- KISS -->

<div class="counter-card">

<h2>😘 Kiss Counter</h2>

<div id="kissCount">
1 😘
</div>

<p>
SWEET FOR HIM AND BITTER FOR HER.....😁🤤😘
</p>

<label>
Last Updated
</label>

<input
type="date"
id="kissDate">

<button onclick="saveKissDate()">
Save
</button>

<div id="kissUpdated"></div>

</div>

<!-- HUG -->

<div class="counter-card">

<h2>🫂 Hug Counter</h2>

<div id="hugCount">
1 🫂
</div>

<p>
WE WANT MORE...🫂🤤
</p>

<label>
Last Updated
</label>

<input
type="date"
id="hugDate">

<button onclick="saveHugDate()">
Save
</button>

<div id="hugUpdated"></div>

</div>

<!-- SPECIAL DAY COUNTERS -->

<div class="days-grid">

<div class="day-card">

<h3>
❤️ Proposal
</h3>

<div id="proposalDays"></div>

</div>

<div class="day-card">

<h3>

</h3>

</div>

<div class="day-card">

<h3>
😘 First Kiss
</h3>

<div id="kissDays"></div>

</div>

<div class="day-card">

<h3>
🫂 First Hug
</h3>

</div>

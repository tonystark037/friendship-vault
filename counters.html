<section class="counter-page">

<h1>😘 & 🫂 Love Counters ❤️</h1>

<!-- KISS -->

<div class="counter-card">

<h2>😘 Kiss Counter</h2>

<div id="kissCount" class="big-counter">
1
</div>

<div id="kissEmojis" class="emoji-row"></div>

<p>
SWEET FOR HIM AND BITTER FOR HER.....😁🤤😘
</p>

<div class="counter-buttons">

<button onclick="changeKiss(-1)">
➖
</button>

<button onclick="changeKiss(1)">
➕
</button>

</div>

<div id="kissUpdated"></div>

</div>

<!-- HUG -->

<div class="counter-card">

<h2>🫂 Hug Counter</h2>

<div id="hugCount" class="big-counter">
1
</div>

<div id="hugEmojis" class="emoji-row"></div>

<p>
WE WANT MORE...🫂🤤
</p>

<div class="counter-buttons">

<button onclick="changeHug(-1)">
➖
</button>

<button onclick="changeHug(1)">
➕
</button>

</div>

<div id="hugUpdated"></div>

</div>

<!-- RELATIONSHIP DAYS -->

<div class="days-grid">

<div class="day-card">
<h3>❤️ Proposal</h3>
<div id="proposalDays"></div>
</div>

<div class="day-card">
<h3>❤️ She Said Yes</h3>
<div id="yesDays"></div>
</div>

<div class="day-card">
<h3>😘 First Kiss</h3>
<div id="kissDays"></div>
</div>

<div class="day-card">
<h3>🫂 First Hug</h3>
<div id="hugDays"></div>
</div>

</div>

</section>
